services:
  postgres:
    container_name: harness-kanban-postgres
    image: ghcr.io/pgmq/pg18-pgmq:v1.7.0
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrestemppassword}
      POSTGRES_DB: ${POSTGRES_DB:-harness_kanban}
    ports:
      - '5432:5432'
    volumes:
      - postgres_pgmq_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    container_name: harness-kanban-minio
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  api:
    container_name: harness-kanban-api
    image: ghcr.io/orenoid/harness-kanban-api:latest
    pull_policy: always
    environment:
      PORT: 3001
      APP_ENV: prod
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgrestemppassword@postgres:5432/harness_kanban
      BETTER_AUTH_SECRET: change-me-before-public-deploy
      BETTER_AUTH_URL: http://localhost:3001
      APP_BASE_URL: http://localhost:3000
      AI_PROVIDER: openai
      OPENAI_API_KEY: ''
      OPENAI_MODEL: gpt-4o-mini
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3001:3001'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health']
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    container_name: harness-kanban-web
    image: ghcr.io/orenoid/harness-kanban-web:latest
    pull_policy: always
    environment:
      PORT: 3000
      NODE_ENV: production
      RUNTIME_API_BASE_URL: http://localhost:3001
      RUNTIME_SOCKET_SERVER_URL: http://localhost:3001
      STORYBOOK_PORT: 6006
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: false
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: harness-kanban-uploads
      MINIO_PUBLIC_BASE_URL: http://localhost:9000
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - '3000:3000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          'fetch("http://127.0.0.1:" + (process.env.PORT || 3000)).then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))',
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    container_name: harness-kanban-worker
    image: ghcr.io/orenoid/harness-kanban-worker:latest
    pull_policy: always
    environment:
      DATABASE_URL: postgresql://postgres:postgrestemppassword@postgres:5432/harness_kanban
      NODE_ENV: production
      HARNESS_WORKER_TOOLCHAIN_STORE_DIR: /opt/harness-kanban/toolchains
      HARNESS_WORKER_CODEX_TOOLCHAIN_VERSION: 0.116.0
      HARNESS_WORKER_CLAUDE_CODE_TOOLCHAIN_VERSION: 2.1.92
      HARNESS_WORKER_GIT_COMMIT_NAME: CodeBot
      HARNESS_WORKER_GIT_COMMIT_EMAIL: bot_code_bot@harness-kanban.local
      HARNESS_WORKER_CODING_AGENT_TIMEOUT_MS: 1800000
      HARNESS_WORKER_CODING_AGENT_OUTPUT_REPAIR_ATTEMPTS: 2
      HARNESS_WORKER_IMPLEMENTATION_REVIEW_REPAIR_ATTEMPTS: 2
      HARNESS_WORKER_HEARTBEAT_INTERVAL_MS: 10000
      HARNESS_WORKER_POLL_INTERVAL_MS: 5000
      HARNESS_WORKER_STALE_TIMEOUT_MS: 60000
      HARNESS_WORKER_GITHUB_READINESS_POLL_INTERVAL_MS: 15000
      HARNESS_WORKER_GITHUB_READINESS_TIMEOUT_MS: 1800000
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - /var/lib/harness-kanban/devpod:/var/lib/harness-kanban/devpod
      - /var/lib/harness-kanban/docker-config:/var/lib/harness-kanban/docker-config
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock

volumes:
  postgres_pgmq_data:
  minio_data:
